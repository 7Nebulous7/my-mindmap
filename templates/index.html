<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>百业·云间甜铺</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏯</text></svg>">
    <link rel="stylesheet" href="/static/common.css">
    <script src="/static/particles.js"></script>
    <style>
        body {
            flex-direction: column;
            gap: 24px;
            padding-top: 70px;
            padding-bottom: 40px;
            overflow-y: auto;
        }

        /* 欢迎语 */
        .welcome {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeInUp 0.6s ease both;
        }
        .welcome h1 {
            font-size: 28px;
            color: #4a3f35;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .welcome .sub {
            font-size: 14px;
            color: #8a7a6a;
            margin-top: 6px;
            letter-spacing: 1px;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 卡片网格 */
        .cards {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            max-width: 800px;
            width: 90%;
        }

        .card {
            background: rgba(255,248,240,0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 12px 40px rgba(100,70,50,0.1), inset 0 1px 0 rgba(255,255,255,0.5);
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: fadeInUp 0.5s ease both;
        }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        .card.active:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(100,70,50,0.18), inset 0 1px 0 rgba(255,255,255,0.6);
            background: rgba(255,248,240,0.7);
        }
        .card.active:active {
            transform: scale(0.97);
        }

        .card.locked {
            opacity: 0.55;
            cursor: default;
        }

        .card .icon {
            font-size: 42px;
            line-height: 1;
        }
        .card .title {
            font-size: 20px;
            font-weight: 600;
            color: #4a3f35;
            letter-spacing: 1px;
        }
        .card .desc {
            font-size: 13px;
            color: #8a7a6a;
        }
        .card .tag {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .card .tag.open {
            background: rgba(138,122,106,0.12);
            color: #6a5a4a;
        }
        .card .tag.wait {
            background: rgba(160,140,120,0.08);
            color: #a09080;
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <!-- 顶部导航栏 -->
    <nav class="nav-bar">
        <a href="/" class="nav-brand" style="text-decoration:none;color:#4a3f35;">🏯 百业·云间甜铺</a>
        <div class="nav-right">
            {% if user_name %}
            <span class="nav-user">👋 {{ user_name }}</span>
            {% endif %}
            <a href="/logout" class="nav-link">🚪 退出登录</a>
        </div>
    </nav>

    <!-- 欢迎语 -->
    <div class="welcome">
        <h1>⚔️ 百业·云间甜铺</h1>
        <div class="sub">燕云十六声玩家社区 · 攻略资料库</div>
    </div>

    <!-- 板块卡片 -->
    <div class="cards">
        <a href="/mindmap" class="card active">
            <div class="icon">📖</div>
            <div class="title">萌新必看知识库</div>
            <div class="desc">武学流派 · 奇术攻略 · 装备养成 · 抽卡系统</div>
            <span class="tag open">点击进入</span>
        </a>

        <div class="card locked">
            <div class="icon">⚔️</div>
            <div class="title">副本攻略</div>
            <div class="desc">Boss机制 · 通关技巧 · 阵容搭配</div>
            <span class="tag wait">敬请期待</span>
        </div>

        <div class="card locked">
            <div class="icon">🎭</div>
            <div class="title">外观穿搭</div>
            <div class="desc">时装展示 · 染色方案 · 配饰图鉴</div>
            <span class="tag wait">敬请期待</span>
        </div>

        <div class="card locked">
            <div class="icon">💰</div>
            <div class="title">交易市场</div>
            <div class="desc">销金窟指南 · 物价参考 · 理财心得</div>
            <span class="tag wait">敬请期待</span>
        </div>
    </div>

    <!-- 底部版权栏 -->
    <div class="footer-bar">© 百业·云间甜铺 · 燕云十六声玩家社区</div>

</body>
</html>
