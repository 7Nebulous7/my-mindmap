<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>萌新必看 · 百业·云间甜铺</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏯</text></svg>">
    <link rel="stylesheet" href="/static/common.css">
    <script src="/static/particles.js"></script>
    <style>
        body {
            flex-direction: column;
            gap: 24px;
            padding-top: 70px;
            padding-bottom: 50px;
            overflow-y: auto;
        }

        .page-title {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeInUp 0.5s ease both;
        }
        .page-title .breadcrumb {
            font-size: 13px;
            color: #a09080;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .page-title .breadcrumb a {
            color: #8a7a6a;
            text-decoration: none;
            transition: 0.2s;
        }
        .page-title .breadcrumb a:hover {
            color: #4a3f35;
        }
        .page-title h1 {
            font-size: 26px;
            color: #4a3f35;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .page-title .sub {
            font-size: 14px;
            color: #8a7a6a;
            margin-top: 4px;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .cards {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 90%;
        }

        .card {
            background: rgba(255,248,240,0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 36px 28px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 12px 40px rgba(100,70,50,0.1), inset 0 1px 0 rgba(255,255,255,0.5);
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            animation: fadeInUp 0.5s ease both;
        }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(100,70,50,0.18), inset 0 1px 0 rgba(255,255,255,0.6);
            background: rgba(255,248,240,0.7);
        }
        .card:active {
            transform: scale(0.97);
        }

        .card .icon {
            font-size: 48px;
            line-height: 1;
        }
        .card .title {
            font-size: 21px;
            font-weight: 600;
            color: #4a3f35;
            letter-spacing: 1px;
        }
        .card .count {
            font-size: 13px;
            color: #8a7a6a;
            background: rgba(138,122,106,0.08);
            padding: 4px 14px;
            border-radius: 14px;
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <nav class="nav-bar">
        <a href="/" class="nav-brand" style="text-decoration:none;color:#4a3f35;">🏯 百业·云间甜铺</a>
        <div class="nav-right">
            <a href="/" class="nav-link">← 返回门户</a>
            {% if user_name %}
            <span class="nav-user">👋 {{ user_name }}</span>
            {% endif %}
            <a href="/logout" class="nav-link">🚪 退出登录</a>
        </div>
    </nav>

    <div class="page-title">
        <div class="breadcrumb"><a href="/">百业·云间甜铺</a> › 萌新必看知识库</div>
        <h1>📖 萌新必看知识库</h1>
        <div class="sub">武学流派 · 奇术攻略 · 装备养成 · 抽卡系统</div>
    </div>

    <div class="cards">
        {% for cat in categories %}
        <a href="/guide/{{ cat.id }}" class="card">
            <div class="icon">{{ cat.icon }}</div>
            <div class="title">{{ cat.title }}</div>
            <div class="count">{{ cat.topics|length }} 个专题</div>
        </a>
        {% endfor %}
    </div>

    <div class="footer-bar">© 百业·云间甜铺 · 燕云十六声玩家社区</div>

</body>
</html>
